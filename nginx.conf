server {
    listen 80;
    server_name www.remotelyhuman.com;
    return 301 https://remotelyhuman.com$request_uri;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;

    include /etc/nginx/snippets/security-headers.conf;

    # legal pages must stay resolvable forever (OAuth verification URLs)
    location / {
        try_files $uri $uri.html $uri/index.html =404;
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }

    error_page 404 /404.html;

    # content-hashed bundles: safe to cache forever
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # self-hosted fonts: content-stable files, cache long. ^~ so this prefix
    # wins over the image/font extension regex below.
    location ^~ /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    location ~* \.(svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # page-agent widget backend: same-origin proxy to the LiteLLM gateway over
    # the NetBird mesh (gateway is mesh-only; browsers can't reach 100.x and
    # Chrome blocks public->local fetches anyway). Exact path only — nothing
    # else of the gateway is exposed. Auth stays the widget's scoped key.
    location = /api/llm/chat/completions {
        proxy_pass http://100.78.174.163:4000/v1/chat/completions;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        client_max_body_size 2m;
    }
}
